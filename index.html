<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applicaiton Tracker</title>

    <!-- daisy + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="container mx-auto">
    <header class="space-y-8">
        <h1 class="text-3xl font-bold">Job Application Tracker</h1>

        <!-- dynamic counts -->
        <div class="grid md:grid-cols-3 gap-4">
            <div class="shadow-sm p-4 rounded-md">
                <p>Total</p>
                <p id="total-count" class="text-2xl">0</p>
            </div>
            <div class="shadow-sm p-4 rounded-md">
                <p>Interview</p>
                <p id="interview-count" class="text-2xl">0</p>
            </div>
            <div class="shadow-sm p-4 rounded-md">
                <p>Rejected</p>
                <p id="rejected-count" class="text-2xl">0</p>
            </div>
        </div>

        <hr>
    </header>

    <main>
        <section>
            <h1 class="text-2xl font-bold">Available Jobs</h1>

            <!-- buttons -->
            <div class="buttons space-x-2">
                <button id="filter-all" class="btn btn-primary btn-soft">All</button>
                <button id="filter-interview" class="btn btn-primary btn-soft">Interview</button>
                <button id="filter-rejected" class="btn btn-primary btn-soft">Rejected</button>
            </div>
        </section>
    </main>
</body>

</html>
